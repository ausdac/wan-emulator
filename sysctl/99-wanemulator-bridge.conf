# WANEmulator: prevent iptables/nftables from seeing bridged frames.
# Only effective when br_netfilter is loaded. Without this, firewall rules
# applied to bridged traffic would interfere with inline forwarding.
net.bridge.bridge-nf-call-iptables  = 0
net.bridge.bridge-nf-call-ip6tables = 0
net.bridge.bridge-nf-call-arptables = 0
