# WANEmulator: prevent NetworkManager from managing data-plane interfaces.
# NM will not bring up, configure, or touch these interfaces at startup,
# which would otherwise race with wanemulator.service and reset bridge membership.
[keyfile]
unmanaged-devices=interface-name:ens1f0;interface-name:ens1f1;interface-name:ens2f0;interface-name:ens2f1;interface-name:br1;interface-name:br2
